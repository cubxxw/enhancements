# Enhancements Workflow Kep Proposal Workflow

## Action

Follow the kep-proposal-workflow workflow:
1. Create a new directory under keps/sig-api-machinery/<kep-number>-<feature-name>/
2. Add README.md and kep.yaml to the new directory
3. Add related analysis/BEFORE/AFTER documentation if needed
4. Add a corresponding prod-readiness YAML under keps/prod-readiness/sig-api-machinery/

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: keps/sig-api-machinery/*/README.md, keps/sig-api-machinery/*/kep.yaml, keps/sig-api-machinery/*/AFTER.md

